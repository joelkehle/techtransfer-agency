services:
  bus:
    build: .
    command: ["techtransfer-agency"]
    ports:
      - "${BUS_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      STATE_FILE: "/data/state.json"
      AGENT_ALLOWLIST: ${AGENT_ALLOWLIST:-tta-operator,tta-patent-extractor,tta-prior-art-extractor,tta-market-extractor,tta-patent-screen,tta-prior-art-search,tta-market-analysis}
    volumes:
      - bus-data:/data
    networks:
      - agentnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  operator:
    build: .
    command:
      - operator
      - -bus-url=http://bus:8080
      - -addr=:8090
      - -agent-id=${OPERATOR_AGENT_ID:-tta-operator}
      - -web-dir=/app/web
      - -upload-dir=/uploads
    ports:
      - "${OPERATOR_PORT:-3000}:8090"
    environment:
      OPERATOR_AGENT_SECRET: ${OPERATOR_AGENT_SECRET:?OPERATOR_AGENT_SECRET is required}
      WORKFLOW_TARGET_PATENT_SCREEN: ${PATENT_EXTRACTOR_AGENT_ID:-tta-patent-extractor}
      WORKFLOW_TARGET_PRIOR_ART_SEARCH: ${PRIOR_ART_EXTRACTOR_AGENT_ID:-tta-prior-art-extractor}
      WORKFLOW_TARGET_MARKET_ANALYSIS: ${MARKET_EXTRACTOR_AGENT_ID:-tta-market-extractor}
    volumes:
      - uploads:/uploads
      - ./web:/app/web:ro
    networks:
      - agentnet
    depends_on:
      bus:
        condition: service_healthy

  patent-extractor:
    build: .
    command:
      - patent-extractor
      - -bus-url=http://bus:8080
      - -agent-id=${PATENT_EXTRACTOR_AGENT_ID:-tta-patent-extractor}
      - -next-agent-id=${PATENT_SCREEN_AGENT_ID:-tta-patent-screen}
    environment:
      PATENT_EXTRACTOR_AGENT_SECRET: ${PATENT_EXTRACTOR_AGENT_SECRET:?PATENT_EXTRACTOR_AGENT_SECRET is required}
    volumes:
      - uploads:/uploads
    networks:
      - agentnet
    depends_on:
      bus:
        condition: service_healthy

  prior-art-extractor:
    build: .
    command:
      - patent-extractor
      - -bus-url=http://bus:8080
      - -agent-id=${PRIOR_ART_EXTRACTOR_AGENT_ID:-tta-prior-art-extractor}
      - -capability=prior-art-search
      - -secret-env=PRIOR_ART_EXTRACTOR_AGENT_SECRET
      - -next-agent-id=${PRIOR_ART_SEARCH_AGENT_ID:-tta-prior-art-search}
    environment:
      PRIOR_ART_EXTRACTOR_AGENT_SECRET: ${PRIOR_ART_EXTRACTOR_AGENT_SECRET:?PRIOR_ART_EXTRACTOR_AGENT_SECRET is required}
    volumes:
      - uploads:/uploads
    networks:
      - agentnet
    depends_on:
      bus:
        condition: service_healthy

  market-extractor:
    build: .
    command:
      - patent-extractor
      - -bus-url=http://bus:8080
      - -agent-id=${MARKET_EXTRACTOR_AGENT_ID:-tta-market-extractor}
      - -capability=market-analysis
      - -secret-env=MARKET_EXTRACTOR_AGENT_SECRET
      - -next-agent-id=${MARKET_ANALYSIS_AGENT_ID:-tta-market-analysis}
    environment:
      MARKET_EXTRACTOR_AGENT_SECRET: ${MARKET_EXTRACTOR_AGENT_SECRET:?MARKET_EXTRACTOR_AGENT_SECRET is required}
    volumes:
      - uploads:/uploads
    networks:
      - agentnet
    depends_on:
      bus:
        condition: service_healthy

  market-analysis:
    build: .
    command:
      - market-analysis
      - -bus-url=http://bus:8080
      - -agent-id=${MARKET_ANALYSIS_AGENT_ID:-tta-market-analysis}
    environment:
      MARKET_ANALYSIS_AGENT_SECRET: ${MARKET_ANALYSIS_AGENT_SECRET:?MARKET_ANALYSIS_AGENT_SECRET is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_EXPORTER_OTLP_TRACES_HEADERS: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
    volumes:
      - uploads:/uploads
    networks:
      - agentnet
    depends_on:
      bus:
        condition: service_healthy

  patent-screen:
    image: ghcr.io/joelkehle/tdg-ip-agents/patent-screen:${TDG_IP_AGENTS_TAG:-latest}
    command:
      - -bus-url=http://bus:8080
      - -agent-id=${PATENT_SCREEN_AGENT_ID:-tta-patent-screen}
    environment:
      PATENT_SCREEN_AGENT_SECRET: ${PATENT_SCREEN_AGENT_SECRET:?PATENT_SCREEN_AGENT_SECRET is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_EXPORTER_OTLP_TRACES_HEADERS: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
    volumes:
      - uploads:/uploads
    networks:
      - agentnet
    depends_on:
      bus:
        condition: service_healthy

  prior-art-search:
    image: ghcr.io/joelkehle/tdg-ip-agents/prior-art-search:${TDG_IP_AGENTS_TAG:-latest}
    command:
      - -bus-url=http://bus:8080
      - -agent-id=${PRIOR_ART_SEARCH_AGENT_ID:-tta-prior-art-search}
    environment:
      PRIOR_ART_AGENT_SECRET: ${PRIOR_ART_AGENT_SECRET:?PRIOR_ART_AGENT_SECRET is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      PATENTSVIEW_API_KEY: ${PATENTSVIEW_API_KEY:?PATENTSVIEW_API_KEY is required}
      PRIOR_ART_LLM_MODEL: ${PRIOR_ART_LLM_MODEL:-claude-sonnet-4-20250514}
      PRIOR_ART_MAX_PATENTS: ${PRIOR_ART_MAX_PATENTS:-300}
      PRIOR_ART_MAX_ASSESS: ${PRIOR_ART_MAX_ASSESS:-75}
      PRIOR_ART_BATCH_SIZE: ${PRIOR_ART_BATCH_SIZE:-15}
      PRIOR_ART_RATE_LIMIT: ${PRIOR_ART_RATE_LIMIT:-40}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_EXPORTER_OTLP_TRACES_HEADERS: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
    volumes:
      - uploads:/uploads
    networks:
      - agentnet
    depends_on:
      bus:
        condition: service_healthy

volumes:
  bus-data:
  uploads:

networks:
  agentnet:
    name: ${STACK_NETWORK_NAME:-tta-agentnet}
